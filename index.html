<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDhaka - Bus Tickets in Dhaka</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <h1>Go<span>Dhaka</span></h1>
            </div>
            
            <div class="nav-links">
                <a href="#" class="active"><i class="fas fa-bus"></i> Bus</a>
                <a href="#"><i class="fas fa-train"></i> Train</a>
                <a href="#"><i class="fas fa-car"></i> CNG</a>
                <a href="#"><i class="fas fa-map"></i> Routes</a>
            </div>

            <div class="header-right">
                <button class="contact-btn">
                    <i class="fas fa-phone"></i> 01637-XXXXXX
                </button>
                <button class="login-btn">Login</button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="search-container">
                <div class="trip-type">
                    <label class="active">
                        <input type="radio" name="trip" checked> One Way
                    </label>
                    <label>
                        <input type="radio" name="trip"> Round Trip
                    </label>
                </div>

                <div class="search-form">
                    <div class="input-group">
                        <label>From</label>
                        <select id="from-select">
                            <option value="">Select Departure</option>
                            <option value="Gulshan">Gulshan</option>
                            <option value="Mirpur">Mirpur</option>
                            <option value="Uttara">Uttara</option>
                            <option value="Dhanmondi">Dhanmondi</option>
                            <option value="Motijheel">Motijheel</option>
                            <option value="Mohammadpur">Mohammadpur</option>
                        </select>
                    </div>

                    <div class="swap-icon">
                        <i class="fas fa-exchange-alt"></i>
                    </div>

                    <div class="input-group">
                        <label>To</label>
                        <select id="to-select">
                            <option value="">Select Destination</option>
                            <option value="Gulshan">Gulshan</option>
                            <option value="Mirpur">Mirpur</option>
                            <option value="Uttara">Uttara</option>
                            <option value="Dhanmondi">Dhanmondi</option>
                            <option value="Motijheel">Motijheel</option>
                            <option value="Mohammadpur">Mohammadpur</option>
                            <option value="Savar">Savar</option>
                            <option value="Gazipur">Gazipur</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Journey Date</label>
                        <input type="date" id="journey-date" value="2026-05-20">
                    </div>

                    <button class="search-btn" onclick="searchBuses()">
                        <i class="fas fa-search"></i> SEARCH BUSES
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Results Section -->
    <section class="results-section" id="results">
        <div class="container">
            <h2 id="results-title">Popular Routes in Dhaka</h2>
            
            <div class="bus-list" id="bus-list">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Notice -->
    <section class="notice">
        <div class="notice-card">
            <h3><i class="fas fa-bullhorn"></i> Important Notice</h3>
            <p><strong>Eid Special Service:</strong> Extra buses running from 14 May 2026 to 13 June 2026.</p>
            <p>Tickets are non-refundable during peak periods.</p>
        </div>
    </section>

    <script src="./js/app.js"></script>
</body>
</html>
